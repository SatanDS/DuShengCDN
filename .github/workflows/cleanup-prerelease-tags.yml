name: Cleanup prerelease tags

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DUSHENGCDN_RELEASE_REPOSITORY: SatanDS/DuShengCDN-releases

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type cleanup-prerelease-tags to delete all prerelease releases and tags"
        required: true
        type: string

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete prerelease releases and tags
        env:
          GH_TOKEN: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
          CONFIRM: ${{ github.event.inputs.confirm }}
          RELEASE_REPO: ${{ env.DUSHENGCDN_RELEASE_REPOSITORY }}
        run: |
          if [[ "$CONFIRM" != "cleanup-prerelease-tags" ]]; then
            echo "confirm input must be exactly cleanup-prerelease-tags" >&2
            exit 1
          fi

          mapfile -t TAGS < <(
            gh release list --repo "$RELEASE_REPO" --limit 200 --json tagName,isPrerelease \
              --jq '.[] | select(.isPrerelease == true) | .tagName' | sort -V
          )
          DELETED=0

          for TAG in "${TAGS[@]}"; do
            if gh release view "$TAG" --repo "$RELEASE_REPO" >/dev/null 2>&1; then
              echo "Delete prerelease release: $TAG"
              gh release delete "$TAG" --repo "$RELEASE_REPO" --yes
            else
              echo "No GitHub Release found for $TAG"
            fi

            echo "Delete prerelease tag: $TAG"
            gh api -X DELETE "repos/$RELEASE_REPO/git/refs/tags/$TAG" >/dev/null || true
            DELETED=$((DELETED + 1))
          done

          echo "Deleted $DELETED prerelease tag(s)."
