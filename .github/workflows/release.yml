name: Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DUSHENGCDN_RELEASE_REPOSITORY: SatanDS/SatanDS-DuShengCDN-releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag to publish, for example v1.0.0-beta"
        required: false
        type: string
  push:
    branches: ["main"]
    tags: ["v*"]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.version.outputs.should_run }}
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version metadata
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          SHOULD_RUN=true
          POINTED_TAG="$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n1)"
          INPUT_VERSION="${INPUT_VERSION//[[:space:]]/}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ -n "$POINTED_TAG" ]]; then
            VERSION="$POINTED_TAG"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "workflow_dispatch requires an explicit version input when HEAD is not tagged" >&2
            exit 1
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            BASE_VERSION="$(tr -d '[:space:]' < VERSION)"
            BASE_VERSION="${BASE_VERSION#v}"
            if [[ "$BASE_VERSION" =~ ^([0-9]+)\.([0-9]+)\.x$ ]]; then
              BASE_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${GITHUB_RUN_NUMBER}"
            elif [[ ! "$BASE_VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              echo "VERSION file must contain a numeric base version for automatic main releases" >&2
              exit 1
            fi
            SHORT_SHA="$(git rev-parse --short=12 HEAD)"
            VERSION="v${BASE_VERSION}-private.${GITHUB_RUN_NUMBER}-g${SHORT_SHA}"
          else
            echo "unable to resolve release version from the current ref" >&2
            exit 1
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"

  build-frontend:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build Frontend
        env:
          CI: ""
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cd dushengcdn_server/web
          corepack enable
          pnpm install --frozen-lockfile
          NEXT_PUBLIC_APP_VERSION="$VERSION" pnpm build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: dushengcdn_server/web/build
          retention-days: 1

  build-binaries:
    needs:
      - prepare
      - build-frontend
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: dushengcdn-server-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: dushengcdn-server-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: dushengcdn-server-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: dushengcdn-server-darwin-arm64
          - goos: windows
            goarch: amd64
            asset_name: dushengcdn-server-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: dushengcdn_server/web/build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: dushengcdn_server/go.sum

      - name: Build Server
        working-directory: dushengcdn_server
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_WATERMARK: ${{ github.repository }}:${{ needs.prepare.outputs.version }}:${{ github.run_id }}:${{ github.sha }}
          COMMERCIAL_LICENSE_PUBLIC_KEYS: ${{ secrets.DUSHENGCDN_LICENSE_PUBLIC_KEYS }}
          RELEASE_SIGNATURE_PUBLIC_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNATURE_PUBLIC_KEY }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          go mod download
          if [[ -z "$RELEASE_SIGNATURE_PUBLIC_KEY" || -z "$RELEASE_SIGNING_PRIVATE_KEY" ]]; then
            echo "release signing secrets are required" >&2
            exit 1
          fi
          if [[ -z "$COMMERCIAL_LICENSE_PUBLIC_KEYS" ]]; then
            echo "DUSHENGCDN_LICENSE_PUBLIC_KEYS secret is required for commercial server builds" >&2
            exit 1
          fi
          mkdir -p ../dist
          go build -trimpath -buildvcs=false -ldflags "-s -w -X 'dushengcdn/common.Version=$VERSION' -X 'dushengcdn/common.ReleaseSignaturePublicKey=$RELEASE_SIGNATURE_PUBLIC_KEY' -X 'dushengcdn/common.CommercialBuildWatermark=$BUILD_WATERMARK' -X 'dushengcdn/common.CommercialLicensePublicKeys=$COMMERCIAL_LICENSE_PUBLIC_KEYS'" -o "../dist/$ASSET_NAME" .
          (cd ../dist && sha256sum "$ASSET_NAME" > "$ASSET_NAME.sha256")
          GOOS= GOARCH= go run ../scripts/sign-release-asset.go -private-key "$RELEASE_SIGNING_PRIVATE_KEY" -tag "$VERSION" -asset "$ASSET_NAME" -checksum-file "../dist/$ASSET_NAME.sha256" -signature-file "../dist/$ASSET_NAME.sig"

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
            dist/${{ matrix.asset_name }}.sig
          retention-days: 1

  build-agent-binaries:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: dushengcdn-agent-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: dushengcdn-agent-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: dushengcdn-agent-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: dushengcdn-agent-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: dushengcdn_agent/go.sum

      - name: Build Agent
        working-directory: dushengcdn_agent
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_WATERMARK: ${{ github.repository }}:${{ needs.prepare.outputs.version }}:${{ github.run_id }}:${{ github.sha }}
          RELEASE_SIGNATURE_PUBLIC_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNATURE_PUBLIC_KEY }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          go mod download
          GOOS= GOARCH= CGO_ENABLED= go install mvdan.cc/garble@latest
          GARBLE="$(go env GOPATH)/bin/garble"
          if [[ -z "$RELEASE_SIGNATURE_PUBLIC_KEY" || -z "$RELEASE_SIGNING_PRIVATE_KEY" ]]; then
            echo "release signing secrets are required" >&2
            exit 1
          fi
          mkdir -p ../dist
          "$GARBLE" -literals build -trimpath -buildvcs=false -ldflags "-s -w -X 'dushengcdn-agent/internal/config.AgentVersion=$VERSION' -X 'dushengcdn-agent/internal/config.ReleaseSignaturePublicKey=$RELEASE_SIGNATURE_PUBLIC_KEY'" -o "../dist/$ASSET_NAME" ./cmd/agent
          (cd ../dist && sha256sum "$ASSET_NAME" > "$ASSET_NAME.sha256")
          GOOS= GOARCH= go run ../scripts/sign-release-asset.go -private-key "$RELEASE_SIGNING_PRIVATE_KEY" -tag "$VERSION" -asset "$ASSET_NAME" -checksum-file "../dist/$ASSET_NAME.sha256" -signature-file "../dist/$ASSET_NAME.sig"

      - name: Upload Agent Artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
            dist/${{ matrix.asset_name }}.sig
          retention-days: 1

  build-dns-worker-binaries:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: dushengcdn-dns-worker-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: dushengcdn-dns-worker-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: dushengcdn-dns-worker-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: dushengcdn-dns-worker-darwin-arm64
          - goos: windows
            goarch: amd64
            asset_name: dushengcdn-dns-worker-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: dushengcdn_server/go.sum

      - name: Build DNS Worker
        working-directory: dushengcdn_server
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_WATERMARK: ${{ github.repository }}:${{ needs.prepare.outputs.version }}:${{ github.run_id }}:${{ github.sha }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          go mod download
          GOOS= GOARCH= CGO_ENABLED= go install mvdan.cc/garble@latest
          GARBLE="$(go env GOPATH)/bin/garble"
          if [[ -z "$RELEASE_SIGNING_PRIVATE_KEY" ]]; then
            echo "release signing private key is required" >&2
            exit 1
          fi
          mkdir -p ../dist
          "$GARBLE" -literals build -trimpath -buildvcs=false -ldflags "-s -w -X 'main.version=$VERSION'" -o "../dist/$ASSET_NAME" ./cmd/dns-worker
          (cd ../dist && sha256sum "$ASSET_NAME" > "$ASSET_NAME.sha256")
          GOOS= GOARCH= go run ../scripts/sign-release-asset.go -private-key "$RELEASE_SIGNING_PRIVATE_KEY" -tag "$VERSION" -asset "$ASSET_NAME" -checksum-file "../dist/$ASSET_NAME.sha256" -signature-file "../dist/$ASSET_NAME.sig"

      - name: Upload DNS Worker Artifact
        uses: actions/upload-artifact@v7
        with:
          name: dns-worker-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
            dist/${{ matrix.asset_name }}.sig
          retention-days: 1

  release:
    needs:
      - prepare
      - build-binaries
      - build-agent-binaries
      - build-dns-worker-binaries
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: |
            dushengcdn_server/go.sum
            dushengcdn_agent/go.sum

      - name: Download Server Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "server-*"
          path: dist
          merge-multiple: true

      - name: Download Agent Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "agent-*"
          path: dist
          merge-multiple: true

      - name: Download DNS Worker Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "dns-worker-*"
          path: dist
          merge-multiple: true

      - name: Validate Release Token
        env:
          RELEASE_REPO_TOKEN: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
        run: |
          if [[ -z "$RELEASE_REPO_TOKEN" ]]; then
            echo "DUSHENGCDN_RELEASE_REPO_TOKEN secret is required to publish to $DUSHENGCDN_RELEASE_REPOSITORY" >&2
            exit 1
          fi

      - name: Add Customer Installers
        env:
          RELEASE_SIGNATURE_PUBLIC_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNATURE_PUBLIC_KEY }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNING_PRIVATE_KEY }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_SIGNATURE_PUBLIC_KEY" || -z "$RELEASE_SIGNING_PRIVATE_KEY" ]]; then
            echo "release signing secrets are required" >&2
            exit 1
          fi
          sed "s|__DUSHENGCDN_RELEASE_SIGNATURE_PUBLIC_KEY__|$RELEASE_SIGNATURE_PUBLIC_KEY|g" scripts/install-commercial.sh > dist/install-commercial.sh
          sed "s|__DUSHENGCDN_RELEASE_SIGNATURE_PUBLIC_KEY__|$RELEASE_SIGNATURE_PUBLIC_KEY|g" scripts/install-agent.sh > dist/install-agent.sh
          sed "s|__DUSHENGCDN_RELEASE_SIGNATURE_PUBLIC_KEY__|$RELEASE_SIGNATURE_PUBLIC_KEY|g" scripts/install-dns-worker.sh > dist/install-dns-worker.sh
          chmod 0755 dist/install-commercial.sh dist/install-agent.sh dist/install-dns-worker.sh
          (
            cd dist
            sha256sum install-commercial.sh > install-commercial.sh.sha256
            sha256sum install-agent.sh > install-agent.sh.sha256
            sha256sum install-dns-worker.sh > install-dns-worker.sh.sha256
          )
          GOOS= GOARCH= go run scripts/sign-release-asset.go -private-key "$RELEASE_SIGNING_PRIVATE_KEY" -tag "$VERSION" -asset install-commercial.sh -checksum-file dist/install-commercial.sh.sha256 -signature-file dist/install-commercial.sh.sig
          GOOS= GOARCH= go run scripts/sign-release-asset.go -private-key "$RELEASE_SIGNING_PRIVATE_KEY" -tag "$VERSION" -asset install-agent.sh -checksum-file dist/install-agent.sh.sha256 -signature-file dist/install-agent.sh.sig
          GOOS= GOARCH= go run scripts/sign-release-asset.go -private-key "$RELEASE_SIGNING_PRIVATE_KEY" -tag "$VERSION" -asset install-dns-worker.sh -checksum-file dist/install-dns-worker.sh.sha256 -signature-file dist/install-dns-worker.sh.sig

      - name: Generate Release Notes
        id: release_notes
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
          GH_TOKEN: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
        run: |
          set -euo pipefail

          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          MANUAL_NOTES="docs/release-notes/$VERSION.md"
          CHANNEL_LABEL="正式版"
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            CHANNEL_LABEL="预览版"
          fi

          PREVIOUS_RELEASE_TAG=""
          while IFS=$'\t' read -r tag prerelease; do
            if [[ -z "$tag" || "$tag" == "$VERSION" ]]; then
              continue
            fi
            if [[ "$IS_PRERELEASE" == "true" && "$prerelease" == "true" ]]; then
              PREVIOUS_RELEASE_TAG="$tag"
              break
            fi
            if [[ "$IS_PRERELEASE" != "true" && "$prerelease" == "false" ]]; then
              PREVIOUS_RELEASE_TAG="$tag"
              break
            fi
          done < <(gh release list --repo "$DUSHENGCDN_RELEASE_REPOSITORY" --limit 50 --json tagName,isPrerelease --jq '.[] | [.tagName, .isPrerelease] | @tsv' || true)

          PREVIOUS_REF=""
          PREVIOUS_LABEL=""
          if [[ "$PREVIOUS_RELEASE_TAG" =~ -g([0-9a-f]{7,40})$ ]]; then
            PREVIOUS_SHA="${BASH_REMATCH[1]}"
            if git cat-file -e "$PREVIOUS_SHA^{commit}" 2>/dev/null; then
              PREVIOUS_REF="$PREVIOUS_SHA"
              PREVIOUS_LABEL="$PREVIOUS_RELEASE_TAG"
            fi
          fi
          if [[ -z "$PREVIOUS_REF" && -n "$PREVIOUS_RELEASE_TAG" ]] && git rev-parse -q --verify "refs/tags/$PREVIOUS_RELEASE_TAG" >/dev/null; then
            PREVIOUS_REF="$PREVIOUS_RELEASE_TAG"
            PREVIOUS_LABEL="$PREVIOUS_RELEASE_TAG"
          fi
          if [[ -z "$PREVIOUS_REF" ]]; then
            PREVIOUS_TAG="$(git tag --list 'v*' --sort=-v:refname | grep -Fxv "$VERSION" | head -n1 || true)"
            if [[ -n "$PREVIOUS_TAG" ]]; then
              PREVIOUS_REF="$PREVIOUS_TAG"
              PREVIOUS_LABEL="$PREVIOUS_TAG"
            fi
          fi

          {
            echo "## 更新内容"
            echo
            if [[ -f "$MANUAL_NOTES" ]]; then
              cat "$MANUAL_NOTES"
            else
              if [[ -n "$PREVIOUS_REF" ]]; then
                mapfile -t COMMITS < <(git log --no-merges --format='%s' "$PREVIOUS_REF..HEAD" | sed '/^[[:space:]]*$/d' | head -n 30)
              else
                mapfile -t COMMITS < <(git log --no-merges --format='%s' -n 30 HEAD | sed '/^[[:space:]]*$/d')
              fi
              if [[ "${#COMMITS[@]}" -eq 0 ]]; then
                echo "- 商业版二进制自动构建发布。"
              else
                for subject in "${COMMITS[@]}"; do
                  echo "- $subject"
                done
              fi
            fi
            echo
            echo "## 升级说明"
            echo
            echo "- 发布类型：$CHANNEL_LABEL"
            echo "- 发布版本：$VERSION"
            if [[ -n "$PREVIOUS_LABEL" ]]; then
              echo "- 对比基线：$PREVIOUS_LABEL"
            fi
            echo "- 本 Release 只包含商业版二进制、SHA-256 校验文件和签名文件，不发布源码。"
            echo "- 面板检测到该版本后，可在版本面板中查看更新说明并执行手动或自动升级。"
            echo
            echo "## 发布资产"
            echo
            find dist -maxdepth 1 -type f -printf '- %f\n' | sort
          } > "$NOTES_FILE"

          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
          repository: ${{ env.DUSHENGCDN_RELEASE_REPOSITORY }}
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          target_commitish: main
          files: dist/*
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_prerelease == 'true' && 'false' || 'true' }}
          body_path: ${{ steps.release_notes.outputs.path }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
