name: Release
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DUSHENGCDN_RELEASE_REPOSITORY: SatanDS/SatanDS-DuShengCDN-releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag to publish, for example v1.0.0-beta"
        required: false
        type: string
  push:
    branches: ["main"]
    tags: ["v*"]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.version.outputs.should_run }}
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version metadata
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          SHOULD_RUN=true
          POINTED_TAG="$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n1)"
          INPUT_VERSION="${INPUT_VERSION//[[:space:]]/}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          elif [[ -n "$POINTED_TAG" ]]; then
            VERSION="$POINTED_TAG"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "workflow_dispatch requires an explicit version input when HEAD is not tagged" >&2
            exit 1
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            BASE_VERSION="$(tr -d '[:space:]' < VERSION)"
            BASE_VERSION="${BASE_VERSION#v}"
            if [[ ! "$BASE_VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              echo "VERSION file must contain a numeric base version for automatic main releases" >&2
              exit 1
            fi
            SHORT_SHA="$(git rev-parse --short=12 HEAD)"
            VERSION="v${BASE_VERSION}-private.${GITHUB_RUN_NUMBER}-g${SHORT_SHA}"
          else
            echo "unable to resolve release version from the current ref" >&2
            exit 1
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

  build-frontend:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build Frontend
        env:
          CI: ""
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cd dushengcdn_server/web
          corepack enable
          pnpm install --frozen-lockfile
          NEXT_PUBLIC_APP_VERSION="$VERSION" pnpm build

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: dushengcdn_server/web/build
          retention-days: 1

  build-binaries:
    needs:
      - prepare
      - build-frontend
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: dushengcdn-server-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: dushengcdn-server-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: dushengcdn-server-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: dushengcdn-server-darwin-arm64
          - goos: windows
            goarch: amd64
            asset_name: dushengcdn-server-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: dushengcdn_server/web/build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: dushengcdn_server/go.mod
          cache-dependency-path: dushengcdn_server/go.sum

      - name: Build Server
        working-directory: dushengcdn_server
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_SIGNATURE_PUBLIC_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNATURE_PUBLIC_KEY }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          go mod download
          if [[ -z "$RELEASE_SIGNATURE_PUBLIC_KEY" || -z "$RELEASE_SIGNING_PRIVATE_KEY" ]]; then
            echo "release signing secrets are required" >&2
            exit 1
          fi
          mkdir -p ../dist
          go build -trimpath -ldflags "-s -w -X 'dushengcdn/common.Version=$VERSION' -X 'dushengcdn/common.ReleaseSignaturePublicKey=$RELEASE_SIGNATURE_PUBLIC_KEY'" -o "../dist/$ASSET_NAME" .
          (cd ../dist && sha256sum "$ASSET_NAME" > "$ASSET_NAME.sha256")
          GOOS= GOARCH= go run ../scripts/sign-release-asset.go -private-key "$RELEASE_SIGNING_PRIVATE_KEY" -tag "$VERSION" -asset "$ASSET_NAME" -checksum-file "../dist/$ASSET_NAME.sha256" -signature-file "../dist/$ASSET_NAME.sig"

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
            dist/${{ matrix.asset_name }}.sig
          retention-days: 1

  build-agent-binaries:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: dushengcdn-agent-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: dushengcdn-agent-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: dushengcdn-agent-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: dushengcdn-agent-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: dushengcdn_agent/go.mod
          cache-dependency-path: dushengcdn_agent/go.sum

      - name: Build Agent
        working-directory: dushengcdn_agent
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_SIGNATURE_PUBLIC_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNATURE_PUBLIC_KEY }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          go mod download
          if [[ -z "$RELEASE_SIGNATURE_PUBLIC_KEY" || -z "$RELEASE_SIGNING_PRIVATE_KEY" ]]; then
            echo "release signing secrets are required" >&2
            exit 1
          fi
          mkdir -p ../dist
          go build -trimpath -ldflags "-s -w -X 'dushengcdn-agent/internal/config.AgentVersion=$VERSION' -X 'dushengcdn-agent/internal/config.ReleaseSignaturePublicKey=$RELEASE_SIGNATURE_PUBLIC_KEY'" -o "../dist/$ASSET_NAME" ./cmd/agent
          (cd ../dist && sha256sum "$ASSET_NAME" > "$ASSET_NAME.sha256")
          GOOS= GOARCH= go run ../scripts/sign-release-asset.go -private-key "$RELEASE_SIGNING_PRIVATE_KEY" -tag "$VERSION" -asset "$ASSET_NAME" -checksum-file "../dist/$ASSET_NAME.sha256" -signature-file "../dist/$ASSET_NAME.sig"

      - name: Upload Agent Artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
            dist/${{ matrix.asset_name }}.sig
          retention-days: 1

  build-dns-worker-binaries:
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: dushengcdn-dns-worker-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: dushengcdn-dns-worker-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: dushengcdn-dns-worker-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: dushengcdn-dns-worker-darwin-arm64
          - goos: windows
            goarch: amd64
            asset_name: dushengcdn-dns-worker-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: dushengcdn_server/go.mod
          cache-dependency-path: dushengcdn_server/go.sum

      - name: Build DNS Worker
        working-directory: dushengcdn_server
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.DUSHENGCDN_RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          go mod download
          if [[ -z "$RELEASE_SIGNING_PRIVATE_KEY" ]]; then
            echo "release signing private key is required" >&2
            exit 1
          fi
          mkdir -p ../dist
          go build -trimpath -ldflags "-s -w -X 'main.version=$VERSION'" -o "../dist/$ASSET_NAME" ./cmd/dns-worker
          (cd ../dist && sha256sum "$ASSET_NAME" > "$ASSET_NAME.sha256")
          GOOS= GOARCH= go run ../scripts/sign-release-asset.go -private-key "$RELEASE_SIGNING_PRIVATE_KEY" -tag "$VERSION" -asset "$ASSET_NAME" -checksum-file "../dist/$ASSET_NAME.sha256" -signature-file "../dist/$ASSET_NAME.sig"

      - name: Upload DNS Worker Artifact
        uses: actions/upload-artifact@v7
        with:
          name: dns-worker-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
            dist/${{ matrix.asset_name }}.sig
          retention-days: 1

  release:
    needs:
      - prepare
      - build-binaries
      - build-agent-binaries
      - build-dns-worker-binaries
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Server Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "server-*"
          path: dist
          merge-multiple: true

      - name: Download Agent Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "agent-*"
          path: dist
          merge-multiple: true

      - name: Download DNS Worker Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "dns-worker-*"
          path: dist
          merge-multiple: true

      - name: Validate Release Token
        env:
          RELEASE_REPO_TOKEN: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
        run: |
          if [[ -z "$RELEASE_REPO_TOKEN" ]]; then
            echo "DUSHENGCDN_RELEASE_REPO_TOKEN secret is required to publish to $DUSHENGCDN_RELEASE_REPOSITORY" >&2
            exit 1
          fi

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
          repository: ${{ env.DUSHENGCDN_RELEASE_REPOSITORY }}
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          target_commitish: main
          files: dist/*
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_prerelease == 'true' && 'false' || 'true' }}
          body: |
            DuShengCDN commercial binary release.
            Assets include detached SHA-256 checksums and release signatures.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.DUSHENGCDN_RELEASE_REPO_TOKEN }}
