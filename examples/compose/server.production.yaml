services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dushengcdn}
      POSTGRES_USER: ${POSTGRES_USER:-dushengcdn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-with-strong-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dushengcdn} -d ${POSTGRES_DB:-dushengcdn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dushengcdn:
    image: ghcr.io/satands/dushengcdn:${DUSHENGCDN_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DUSHENGCDN_HTTP_BIND:-127.0.0.1}:${DUSHENGCDN_HTTP_PORT:-3010}:3000"
    environment:
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      SQLITE_PATH: ${SQLITE_PATH:-/data/dushengcdn.db}
      DSN: ${DSN:-postgres://dushengcdn:replace-with-strong-password@postgres:5432/dushengcdn?sslmode=disable}
      DATABASE_MAX_OPEN_CONNS: ${DATABASE_MAX_OPEN_CONNS:-30}
      DATABASE_MAX_IDLE_CONNS: ${DATABASE_MAX_IDLE_CONNS:-10}
      DATABASE_CONN_MAX_LIFETIME_SECONDS: ${DATABASE_CONN_MAX_LIFETIME_SECONDS:-1800}
      GIN_MODE: ${GIN_MODE:-release}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AGENT_TOKEN: ${AGENT_TOKEN:-}
      REDIS_CONN_STRING: ${REDIS_CONN_STRING:-}
      REDIS_REQUIRED: ${REDIS_REQUIRED:-false}
      DUSHENGCDN_LICENSE_REQUIRED: ${DUSHENGCDN_LICENSE_REQUIRED:-false}
      DUSHENGCDN_LICENSE_PUBLIC_KEYS: ${DUSHENGCDN_LICENSE_PUBLIC_KEYS:-}
      DUSHENGCDN_LICENSE_ALLOW_UNSIGNED: ${DUSHENGCDN_LICENSE_ALLOW_UNSIGNED:-false}
      DUSHENGCDN_SERVER_AUTO_UPGRADE_ENABLED: ${DUSHENGCDN_SERVER_AUTO_UPGRADE_ENABLED:-false}
    volumes:
      - dushengcdn-data:/data

volumes:
  postgres-data:
  dushengcdn-data:
