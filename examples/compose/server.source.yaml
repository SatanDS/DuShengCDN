services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dushengcdn}
      POSTGRES_USER: ${POSTGRES_USER:-dushengcdn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - ${DUSHENGCDN_REPO_DIR:-../..}/dushengcdn_server/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dushengcdn} -d ${POSTGRES_DB:-dushengcdn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dushengcdn:
    build:
      context: ${DUSHENGCDN_REPO_DIR:-../..}/dushengcdn_server
      dockerfile: Dockerfile
      args:
        VERSION: ${DUSHENGCDN_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DUSHENGCDN_HTTP_BIND:-0.0.0.0}:${DUSHENGCDN_HTTP_PORT:-3010}:3000"
    environment:
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      DUSHENGCDN_INITIAL_ROOT_PASSWORD: ${DUSHENGCDN_INITIAL_ROOT_PASSWORD:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      DUSHENGCDN_JSON_BODY_MAX_BYTES: ${DUSHENGCDN_JSON_BODY_MAX_BYTES:-2097152}
      SQLITE_PATH: ${SQLITE_PATH:-/data/dushengcdn.db}
      DSN: ${DSN:?set DSN in .env}
      DATABASE_MAX_OPEN_CONNS: ${DATABASE_MAX_OPEN_CONNS:-30}
      DATABASE_MAX_IDLE_CONNS: ${DATABASE_MAX_IDLE_CONNS:-10}
      DATABASE_CONN_MAX_LIFETIME_SECONDS: ${DATABASE_CONN_MAX_LIFETIME_SECONDS:-1800}
      GIN_MODE: ${GIN_MODE:-release}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DUSHENGCDN_DNSSEC_KEY_ENCRYPTION_KEY: ${DUSHENGCDN_DNSSEC_KEY_ENCRYPTION_KEY:-}
      DUSHENGCDN_AGENT_LEGACY_GLOBAL_TOKEN_ENABLED: ${DUSHENGCDN_AGENT_LEGACY_GLOBAL_TOKEN_ENABLED:-false}
      AGENT_TOKEN: ${AGENT_TOKEN:-}
      REDIS_CONN_STRING: ${REDIS_CONN_STRING:-}
      REDIS_REQUIRED: ${REDIS_REQUIRED:-false}
      DUSHENGCDN_LICENSE_REQUIRED: ${DUSHENGCDN_LICENSE_REQUIRED:-false}
      DUSHENGCDN_LICENSE_PUBLIC_KEYS: ${DUSHENGCDN_LICENSE_PUBLIC_KEYS:-}
      DUSHENGCDN_LICENSE_ALLOW_UNSIGNED: ${DUSHENGCDN_LICENSE_ALLOW_UNSIGNED:-false}
      DUSHENGCDN_LICENSE_ISSUER_PRIVATE_KEY_FILE: ${DUSHENGCDN_LICENSE_ISSUER_PRIVATE_KEY_FILE:-}
      DUSHENGCDN_LICENSE_ACTIVATION_URL: ${DUSHENGCDN_LICENSE_ACTIVATION_URL:-https://www.satandu.com}
      DUSHENGCDN_LICENSE_ONLINE_ACTIVATION_REQUIRED: ${DUSHENGCDN_LICENSE_ONLINE_ACTIVATION_REQUIRED:-true}
      DUSHENGCDN_LICENSE_ACTIVATION_SERVER_ENABLED: ${DUSHENGCDN_LICENSE_ACTIVATION_SERVER_ENABLED:-false}
      DUSHENGCDN_LICENSE_LEASE_DURATION_HOURS: ${DUSHENGCDN_LICENSE_LEASE_DURATION_HOURS:-72}
      DUSHENGCDN_LICENSE_LEASE_RENEW_BEFORE_HOURS: ${DUSHENGCDN_LICENSE_LEASE_RENEW_BEFORE_HOURS:-6}
      DUSHENGCDN_SERVER_AUTO_UPGRADE_ENABLED: ${DUSHENGCDN_SERVER_AUTO_UPGRADE_ENABLED:-false}
    volumes:
      - ${DUSHENGCDN_REPO_DIR:-../..}/dushengcdn_server/dushengcdn-data:/data
