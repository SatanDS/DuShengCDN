services:
  dushengcdn-agent:
    build:
      context: .
      dockerfile: dushengcdn_agent/Dockerfile
      args:
        VERSION: ${DUSHENGCDN_VERSION:-dev}
    container_name: dushengcdn-agent
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:18081:18081"

    volumes:
      - ./dushengcdn_agent/data/:/data
      - ./secrets/dushengcdn-agent-token:/run/secrets/dushengcdn_agent_token:ro
      # Optional precise IP lookup API token:
      # - ./secrets/dushengcdn-geoip-token:/run/secrets/dushengcdn_geoip_token:ro

    environment:
      DUSHENGCDN_SERVER_URL: ${DUSHENGCDN_SERVER_URL:?set DUSHENGCDN_SERVER_URL in .env}
      DUSHENGCDN_AGENT_TOKEN_FILE: /run/secrets/dushengcdn_agent_token
      # Optional precise IP lookup API. Local GeoIP is used first; this API is queried only when local GeoIP has no country.
      DUSHENGCDN_GEOIP_LOOKUP_API_URL: ${DUSHENGCDN_GEOIP_LOOKUP_API_URL:-}
      # DUSHENGCDN_GEOIP_LOOKUP_API_TOKEN_FILE: /run/secrets/dushengcdn_geoip_token
      LOG_LEVEL: ${LOG_LEVEL:-info}
