services:
  openflare-agent:
    build:
        context: .
        dockerfile: openflare_agent/Dockerfile
    container_name: openflare-agent
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:18081:18081"

    volumes:
      - ./openflare_agent/data/:/data

    environment:
      OPENFLARE_SERVER_URL: "http://host.docker.internal:3000"
      OPENFLARE_AGENT_TOKEN: "373956188ddead1df6dd7c86cd330b73"
      # Optional precise IP lookup API. Local GeoIP is used first; this API is queried only when local GeoIP has no country.
      # OPENFLARE_GEOIP_LOOKUP_API_URL: "https://ipdb.example.com/lookup"
      # OPENFLARE_GEOIP_LOOKUP_API_TOKEN: "replace-with-api-token"
      LOG_LEVEL: "debug"

    extra_hosts:
      - "host.docker.internal:host-gateway"
