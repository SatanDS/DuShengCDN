services:
  dushengcdn-agent:
    build:
      context: .
      dockerfile: dushengcdn_agent/Dockerfile
      args:
        VERSION: ${DUSHENGCDN_VERSION:-dev}
    container_name: dushengcdn-agent
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:18081:18081"

    volumes:
      - ./dushengcdn_agent/data/:/data

    environment:
      DUSHENGCDN_SERVER_URL: ${DUSHENGCDN_SERVER_URL:?set DUSHENGCDN_SERVER_URL in .env}
      DUSHENGCDN_AGENT_TOKEN: ${DUSHENGCDN_AGENT_TOKEN:?set DUSHENGCDN_AGENT_TOKEN in .env}
      # Optional precise IP lookup API. Local GeoIP is used first; this API is queried only when local GeoIP has no country.
      DUSHENGCDN_GEOIP_LOOKUP_API_URL: ${DUSHENGCDN_GEOIP_LOOKUP_API_URL:-}
      DUSHENGCDN_GEOIP_LOOKUP_API_TOKEN: ${DUSHENGCDN_GEOIP_LOOKUP_API_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}

    extra_hosts:
      - "host.docker.internal:host-gateway"
